name: Nightly Dual Backup

on:
  schedule:
    # Runs every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  backup:
    name: pg_dump → Neon + GitHub Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Install PostgreSQL client tools ────────────────────────────
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      # ── 2. Dump Supabase → compressed .dump file ─────────────────────
      - name: Dump Supabase database
        run: |
          DATE=$(date +%Y-%m-%d)
          FILENAME="backup-${DATE}.dump"
          echo "BACKUP_FILE=${FILENAME}" >> $GITHUB_ENV

          # Use full connection URL - most reliable method for pg_dump
          SUPABASE_URL="postgresql://${{ secrets.SUPABASE_DB_USER }}:${{ secrets.SUPABASE_DB_PASSWORD }}@${{ secrets.SUPABASE_DB_HOST }}:5432/${{ secrets.SUPABASE_DB_NAME }}?sslmode=require"

          pg_dump \
            "$SUPABASE_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            --file="${FILENAME}"

          echo "✅ Dump complete: ${FILENAME} ($(du -sh ${FILENAME} | cut -f1))"

      # ── 3. Upload backup as GitHub Actions artifact (30-day retention) ─
      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

      # ── 4. Restore dump into Neon (backup copy) ────────────────────────
      - name: Restore dump into Neon
        run: |
          NEON_URL="postgresql://${{ secrets.NEON_DB_USER }}:${{ secrets.NEON_DB_PASSWORD }}@${{ secrets.NEON_DB_HOST }}:5432/${{ secrets.NEON_DB_NAME }}?sslmode=require"

          pg_restore \
            --dbname="$NEON_URL" \
            --clean \
            --if-exists \
            --no-acl \
            --no-owner \
            --single-transaction \
            "${{ env.BACKUP_FILE }}" || true

          echo "✅ Neon restore complete"

      # ── 5. Verify row counts match ─────────────────────────────────────
      - name: Verify backup integrity
        run: |
          SUPABASE_URL="postgresql://${{ secrets.SUPABASE_DB_USER }}:${{ secrets.SUPABASE_DB_PASSWORD }}@${{ secrets.SUPABASE_DB_HOST }}:5432/${{ secrets.SUPABASE_DB_NAME }}?sslmode=require"
          NEON_URL="postgresql://${{ secrets.NEON_DB_USER }}:${{ secrets.NEON_DB_PASSWORD }}@${{ secrets.NEON_DB_HOST }}:5432/${{ secrets.NEON_DB_NAME }}?sslmode=require"

          echo "=== Supabase row counts ==="
          psql "$SUPABASE_URL" -c "
            SELECT 'student' as table_name, count(*) FROM student
            UNION ALL SELECT 'graduate', count(*) FROM graduate
            UNION ALL SELECT 'university', count(*) FROM university;
          "

          echo "=== Neon row counts ==="
          psql "$NEON_URL" -c "
            SELECT 'student' as table_name, count(*) FROM student
            UNION ALL SELECT 'graduate', count(*) FROM graduate
            UNION ALL SELECT 'university', count(*) FROM university;
          "

      # ── 6. Report result ───────────────────────────────────────────────
      - name: Report backup summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Backup succeeded: $(date)"
            echo "   → GitHub artifact: db-backup-${{ env.BACKUP_FILE }} (30 days)"
            echo "   → Neon copy: restored and verified"
          else
            echo "❌ Backup FAILED at $(date) — check logs above"
            exit 1
          fi
